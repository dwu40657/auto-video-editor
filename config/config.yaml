# Auto Video Editor 全局配置

# 平台设置
platform: kuaishou

# 视频格式
video_format:
  width: 1080
  height: 1920
  fps: 30
  codec: h264
  target_duration: 30
  max_duration: 60

# AI 设置
ai_settings:
  provider: openai  # openai 或 claude
  model: gpt-3.5-turbo
  max_retries: 3

# 快手平台特定设置
kuaishou:
  auto_crop: true
  add_effects: true
  optimize_text: true
  detect_product: true
  highlight_sensitivity: 0.7

# 音乐设置
music:
  enabled: true
  auto_select: true
  min_bpm: 100
  max_bpm: 140
  fade_in_duration: 0.5  # 秒
  fade_out_duration: 0.5  # 秒

# 字幕设置
subtitles:
  enabled: true
  language: zh-CN
  font_size: 24
  position: bottom
  background_opacity: 0.7

# 输出设置
output:
  directory: ./outputs
  format: mp4
  bitrate: 6M
  audio_sample_rate: 48000
  keep_temp_files: false
